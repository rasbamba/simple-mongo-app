<!DOCTYPE html>
<html>
<head>
  <title>Social App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e9f5ec;
    }

    /* NAVBAR */
    .navbar {
      background: #2ecc71;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 25%;
      padding: 20px;
    }

    .profile-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .profile-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }

    /* FEED */
    .feed {
      width: 50%;
      padding: 20px;
    }

    .post-box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .post {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #2ecc71;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    /* CHAT */
    .chat {
      width: 25%;
      padding: 20px;
    }

    .chat-box {
      background: white;
      padding: 10px;
      border-radius: 10px;
      height: 300px;
      overflow-y: auto;
    }

    .message {
      margin: 5px 0;
      padding: 5px;
      background: #d4efdf;
      border-radius: 5px;
    }

  </style>
</head>

<body>

<div class="navbar">
  <span>🌿 MySocial</span>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <!-- PROFILE -->
  <div class="sidebar">
    <div class="profile-card">
      <img src="https://via.placeholder.com/80">
      <h3 id="username">User</h3>
    </div>
  </div>

  <!-- FEED -->
  <div class="feed">

    <div class="post-box">
      <textarea id="postText" placeholder="What's on your mind?"></textarea>
      <button onclick="createPost()">Post</button>
    </div>

    <div id="posts"></div>

  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="chat-box" id="chatBox"></div>

    <input id="msgInput" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
