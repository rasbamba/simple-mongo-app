<!DOCTYPE html>
<html>
<head>
  <title>Auth App</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #0056b3;
    }

    .switch {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
    }

    .switch:hover {
      text-decoration: underline;
    }

    #login, #signup, #reset {
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPswd" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <p class="switch" onclick="showSignup()">Create account</p>
    <p class="switch" onclick="showReset()">Forgot password?</p>
  </div>

  <!-- SIGNUP -->
  <div id="signup">
    <h2>Sign Up</h2>
    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <input id="email" placeholder="Email">
    <input id="pswd" type="password" placeholder="Password">
    <button onclick="send()">Register</button>

    <p class="switch" onclick="showLogin()">Already have account?</p>
  </div>

  <!-- RESET -->
  <div id="reset">
    <h2>Reset Password</h2>
    <input id="resetEmail" placeholder="Email">
    <input id="newPassword" type="password" placeholder="New Password">
    <button onclick="resetPassword()">Reset</button>

    <p class="switch" onclick="showLogin()">Back to login</p>
  </div>

</div>

<script src="script.js"></script>

<script>
  // default screen
  showLogin();
</script>

</body>
</html>
