<!DOCTYPE html>
<html>
<head>
  <title>User App</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .link {
      color: blue;
      cursor: pointer;
      margin-top: 10px;
      display: block;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>User App</h1>

  <!-- MENU -->
  <button onclick="showLogin()">Login</button>
  <button onclick="showSignup()">Sign Up</button>

  <!-- SIGNUP -->
  <div id="signup" class="hidden">
    <h3>Sign Up</h3>
    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <input id="email" placeholder="Email">
    <input id="pswd" type="password" placeholder="Password">
    <button onclick="send()">Register</button>
  </div>

  <!-- LOGIN -->
  <div id="login" class="hidden">
    <h3>Login</h3>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPswd" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <span class="link" onclick="showReset()">Forgot Password?</span>
  </div>

  <!-- RESET -->
  <div id="reset" class="hidden">
    <h3>Reset Password</h3>
    <input id="resetEmail" placeholder="Email">
    <input id="newPassword" type="password" placeholder="New Password">
    <button onclick="resetPassword()">Reset</button>
  </div>

  <p id="msg"></p>

</div>

<script src="script.js"></script>

</body>
</html>
